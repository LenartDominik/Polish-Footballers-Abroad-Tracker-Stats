name: Sync All (Manual)

on:
  # Tylko ręczne uruchomienie - dla --full sync lub debug
  workflow_dispatch:
    inputs:
      tier:
        description: 'Tier to sync (all = everything)'
        required: true
        default: 'all'
        type: choice
        options: [all, top, european, niche]
      full_sync:
        description: 'Run full sync (--full flag)'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          uv sync

      - name: Run sync
        run: |
          cd backend
          ARGS="--tier ${{ github.event.inputs.tier }} --force"
          if [ "${{ github.event.inputs.full_sync }}" = "true" ]; then
            ARGS="$ARGS --full"
          fi
          echo "Running: uv run python sync_full.py $ARGS"
          for i in 1 2 3; do
            uv run python sync_full.py $ARGS && break
            echo "⚠️ Attempt $i failed, retrying in 120s..."
            sleep 120
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Sync failed! Check the logs above."
