name: Sync Players Data

on:
  # Harmonogram: niedziela i środa o 23:00 PL time (22:00 UTC)
  schedule:
    - cron: '0 22 * * 0,3'

  # Ręczne uruchomienie z poziomu GitHub UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          uv sync

      - name: Run sync
        run: |
          cd backend
          uv run python sync_full.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY:   ${{ secrets.SECRET_KEY }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Sync failed! Check the logs above."
          # Opcjonalnie: dodaj webhook do Discord/Slack
