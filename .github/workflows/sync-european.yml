name: Sync European Cups

on:
  # Czwartek o 23:30 PL time (22:30 UTC) - mecze CL/EL są w wt/śr
  schedule:
    - cron: '30 22 * * 4'

  # Ręczne uruchomienie
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          uv sync

      - name: Run sync (european cups)
        run: |
          cd backend
          uv run python sync_full.py --tier european
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ European cups sync failed! Check the logs above."
