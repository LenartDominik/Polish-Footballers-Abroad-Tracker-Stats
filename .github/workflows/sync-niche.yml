name: Sync Niche Leagues

on:
  # Niedziela o 23:30 PL time (22:30 UTC)
  schedule:
    - cron: '30 22 * * 0'

  # Ręczne uruchomienie
  workflow_dispatch:
    inputs:
      full_sync:
        description: 'Run full sync instead of incremental'
        required: false
        default: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          uv sync

      - name: Run sync (niche leagues)
        run: |
          cd backend
          ARGS="--tier niche"
          if [ "${{ github.event.inputs.full_sync }}" = "true" ]; then
            ARGS="$ARGS --full"
          fi
          uv run python sync_full.py $ARGS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          RAPIDAPI_HOST: ${{ secrets.RAPIDAPI_HOST }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Niche leagues sync failed! Check the logs above."
